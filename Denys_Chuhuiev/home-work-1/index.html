<!DOCTYPE html> <!-- Оголошення типу документа HTML5 -->

<html lang="uk"> <!-- Кореневий тег всієї HTML-сторінки, мова сторінки українська -->

<head> <!-- Службова частина сторінки (налаштування) -->
    
    <meta charset="UTF-8"> <!-- Встановлення кодування символів -->
    
    <title>Hello World ДЗ Чугуєва Дениса</title> <!-- Назва сторінки у вкладці браузера -->

</head>

<body> <!-- Основна частина сторінки (весь видимий контент) -->

    <div> <!-- Блочний контейнер для групування елементів -->
        
        <h1>Hello World</h1> <!-- Заголовок першого рівня -->
    
    </div>

    <div> <!-- Блочний контейнер -->
        
        <p> <!-- Абзац тексту -->
            Це моя перша HTML-сторінка.<br> <!-- Перенос рядка -->
            Домашнє завдання студента Чугуєва Дениса.
        </p>
    
    </div>

    <div> <!-- Блочний контейнер -->
        
        <p> <!-- Абзац -->
            Я почав вивчати Fullstack розробку<br> <!-- Перенос рядка -->
            і це мій перший крок у програмуванні.
        </p>
    
    </div>

    <div> <!-- Блочний контейнер -->
        
        <pre> <!-- Тег для збереження форматування тексту (пробіли, відступи) -->
Мене звати: Чугуєв Денис
Курс: Fullstack
Завдання: Створити HTML сторінку
        </pre>
    
    </div>

    <div> <!-- Блочний контейнер для зображення -->
        
        <img src="./2026-02-22_170914.jpg" alt="Image">
        <!-- Тег для відображення зображення:
             src - шлях до картинки
             alt - альтернативний текст -->
    
    </div>

</body>

</html>
