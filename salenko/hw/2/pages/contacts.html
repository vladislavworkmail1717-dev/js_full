<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stone and Bead – Форма замовлення</title>
    <link rel="stylesheet" href="../style.css" />
  </head>

  <body>
    <header>
      <h1>Форма замовлення</h1>
    </header>

    <hr />

    <nav>
      <h2>Навігація</h2>
      <ul>
        <li><a href="../index.html">Головна</a></li>
        <li><a href="articles.html">Каталог</a></li>
        <li><a href="gallery.html">Галерея</a></li>
        <li><a href="contacts.html">Форма замовлення</a></li>
        <li><a href="about.html">Про нас</a></li>
        <li><a href="anchors.html">Якорі</a></li>
      </ul>
    </nav>

    <hr />

    <main>
      <form action="#" method="post">
        <fieldset>
          <legend>Ваші дані</legend>

          <p>
            <label for="name">ПІБ:</label><br />
            <input id="name" type="text" name="name" required />
          </p>

          <p>
            <label for="email">Електронна пошта:</label><br />
            <input
              id="email"
              type="email"
              name="email"
              placeholder="example@example.com"
              required
            />
          </p>

          <p>
            <label for="phone">Телефон:</label><br />
            <input
              id="phone"
              type="tel"
              name="phone"
              placeholder="+380..."
              required
            />
          </p>
        </fieldset>

        <fieldset>
          <legend>Оберіть тип браслета</legend>
          <label><input type="radio" name="type" value="men" /> Чоловічий</label
          ><br />
          <label><input type="radio" name="type" value="women" /> Жіночий</label
          ><br />
          <label
            ><input type="radio" name="type" value="classic" checked />
            Класичний</label
          ><br />
          <label
            ><input type="radio" name="type" value="gift" /> Подарунковий</label
          >
        </fieldset>

        <fieldset>
          <legend>Розмір</legend>
          <label for="size">Оберіть розмір:</label><br />
          <select id="size" name="size" required>
            <option value="">— Оберіть —</option>
            <option value="s">S (16–17 см)</option>
            <option value="m">M (18–19 см)</option>
            <option value="l">L (20–21 см)</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>Додатково</legend>
          <label
            ><input type="checkbox" name="options" value="giftbox" />
            Подарункова коробка</label
          ><br />
          <label
            ><input type="checkbox" name="options" value="pair" /> Парні
            браслети</label
          ><br />
          <label
            ><input type="checkbox" name="options" value="fast" /> Термінове
            виготовлення</label
          >
        </fieldset>

        <fieldset>
          <legend>Коментар до замовлення</legend>
          <label for="comment">Напишіть побажання:</label><br />
          <textarea
            id="comment"
            name="comment"
            rows="4"
            cols="40"
            placeholder="текст для заповнення"
          ></textarea>
        </fieldset>

        <p>
          <button type="submit">Надіслати</button>
          <button type="reset">Очистити</button>
        </p>
      </form>
    </main>
  </body>
</html>
