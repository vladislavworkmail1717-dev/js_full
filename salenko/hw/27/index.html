<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Slider</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="slider">

    <div class="slides">

        <div class="slide active">
            <img src="https://picsum.photos/id/1015/1200/600" alt="">
            <div class="caption">Slide 1</div>
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1016/1200/600" alt="">
            <div class="caption">Slide 2</div>
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1018/1200/600" alt="">
            <div class="caption">Slide 3</div>
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1020/1200/600" alt="">
            <div class="caption">Slide 4</div>
        </div>

    </div>

    <button class="nav prev">&#10094;</button>
    <button class="nav next">&#10095;</button>

    <button class="pause-btn">Pause</button>

    <div class="dots"></div>

</div>

<script src="main.js"></script>
</body>
</html>
