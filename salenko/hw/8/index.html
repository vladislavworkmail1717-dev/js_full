<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>ДЗ 8</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Перший -->
    <div class="container">
      <div class="block left"></div>
      <div class="block right"></div>
      <div class="clear"></div>
    </div>

    <!-- Другий -->
    <div class="container">
      <div class="block left"></div>
      <div class="block right"></div>
      <div class="block right"></div>
      <div class="block right"></div>
      <div class="clear"></div>
    </div>

    <!-- Третій -->
    <div class="container">
      <div class="block left"></div>
      <div class="block left"></div>
      <div class="block right"></div>
      <div class="block right"></div>
      <div class="clear"></div>
    </div>

    <!-- Четвертий -->
    <div class="container">
      <div class="small-group">
        <div class="block small"></div>
        <div class="block small"></div>
      </div>
      <div class="block right big"></div>
      <div class="clear"></div>
    </div>

    <!-- П'ятий -->
    <div class="container">
      <div class="center-group">
        <div class="block big"></div>
        <div class="small-group">
          <div class="block small"></div>
          <div class="block small"></div>
        </div>
      </div>
      <div class="clear"></div>
    </div>
  </body>
</html>
