<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slider — Prototype Version</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<p class="version-badge">Версія 1 — Прототипи</p>

<div class="slider" id="mainSlider">
    <div class="slider__track">
        <div class="slider__slide">
            <img src="https://picsum.photos/id/1015/1200/600" alt="Гірські вершини">
            <div class="slider__caption">
                <div class="slider__caption-title">Гірські вершини</div>
                <div class="slider__caption-sub">Природа · Пригоди</div>
            </div>
        </div>
        <div class="slider__slide">
            <img src="https://picsum.photos/id/1016/1200/600" alt="Лісовий спокій">
            <div class="slider__caption">
                <div class="slider__caption-title">Лісовий спокій</div>
                <div class="slider__caption-sub">Ліс · Природа</div>
            </div>
        </div>
        <div class="slider__slide">
            <img src="https://picsum.photos/id/1018/1200/600" alt="Осінні барви">
            <div class="slider__caption">
                <div class="slider__caption-title">Осінні барви</div>
                <div class="slider__caption-sub">Осінь · Краса</div>
            </div>
        </div>
        <div class="slider__slide">
            <img src="https://picsum.photos/id/1020/1200/600" alt="Відкриті простори">
            <div class="slider__caption">
                <div class="slider__caption-title">Відкриті простори</div>
                <div class="slider__caption-sub">Степ · Свобода</div>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
