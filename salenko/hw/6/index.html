<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ДЗ 6.1. Таблиця Мондріана</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="table_container">
      <table>
        <tr class="height_13">
          <td colspan="2"></td>
          <td colspan="2" class="width_45"></td>
          <td colspan="2" class="yellow width_28"></td>
          <td rowspan="4" class="width_5"></td>
        </tr>

        <tr class="height_25">
          <td class="width_10"></td>
          <td colspan="3" rowspan="2" class="red width_50"></td>
          <td colspan="2" class="yellow width_28"></td>
        </tr>

        <tr class="height_25">
          <td rowspan="2" class="width_10"></td>
          <td></td>
          <td></td>
        </tr>

        <tr class="height_13">
          <td colspan="2" rowspan="2" class="black width_28"></td>
          <td></td>
          <td colspan="2"></td>
        </tr>

        <tr class="height_13">
          <td rowspan="3" class="yellow width_10"></td>
          <td></td>
          <td colspan="2" rowspan="2" class="blue width_28"></td>
          <td rowspan="3" class="red width_5"></td>
        </tr>

        <tr>
          <td colspan="2" rowspan="2"></td>
          <td class="black width_28"></td>
        </tr>

        <tr>
          <td colspan="3"></td>
        </tr>
      </table>
    </div>
  </body>
</html>
