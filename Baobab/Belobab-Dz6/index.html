<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkNet</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>

  <body>
    <table class="main-table">
      <!-- Ряд 1 -->
      <tr class="row-1">
        <td colspan="2" class="w-80;">1</td>
        <td colspan="2">3</td>
        <td colspan="2" class="bg-yellow">5</td>
        <td rowspan="4" class="w-30">7</td>
      </tr>
      <!-- Ряд 2 -->
      <tr class="row-2">
        <td class="w-80">1.1</td>
        <td colspan="3" rowspan="2" class="w-30 bg-red">2.1</td>
        <td colspan="2" class="bg-yellow">5.1</td>
      </tr>
      <!-- Ряд 3 -->
      <tr class="row-3">
        <td rowspan="2" class="w-80">1.2</td>
        <td class="cell-fixed">5.2</td>
        <td class="cell-fixed">6.2</td>
      </tr>
      <!-- Ряд 4 -->
      <tr class="row-4">
        <td colspan="2" rowspan="2" class="w-30 bg-black">2.3</td>
        <td class="h-70">4.3</td>
        <td colspan="2" class="h-70">5.3</td>
      </tr>
      <!-- Ряд 5 -->
      <tr class="row-5">
        <td rowspan="3" class="w-80 bg-yellow">1.4</td>
        <td class="h-65">4.4</td>
        <td colspan="2" rowspan="2" class="bg-blue">5.4</td>
        <td rowspan="3" class="bg-red">7.4</td>
      </tr>
      <!-- Ряд 6 -->
      <tr class="row-6">
        <td colspan="2" rowspan="2" class="w-30">2.5</td>
        <td class="bg-black">4.5</td>
      </tr>
      <!-- Ряд 7 -->
      <tr class="row-7">
        <td colspan="3" class="h-25">4.6</td>
      </tr>
    </table>
  </body>
</html>
