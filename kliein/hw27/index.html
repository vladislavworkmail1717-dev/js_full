<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Слайдер</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    
</head>

<body>
   <h1 style="text-align: center;">Слайдер</h1>

   
</body>
<div class="slider-container">
    <div class="slider-track">
        <div class="slide" style="background-color: lightblue;">Slide 1</div>
        <div class="slide" style="background-color: lightgreen;">Slide 2</div>
        <div class="slide" style="background-color: lightcoral;">Slide 3</div>
        <div class="slide" style="background-color: lightgoldenrodyellow;">Slide 4</div>
        <div class="slide" style="background-color: lightpink;">Slide 5</div>
    </div>
    <button class="nav-btn prev-btn" id="prevBtn">&#10094;</button>
    <button class="nav-btn next-btn" id="nextBtn">&#10095;</button>
    <button class="nav-btn play-btn" id="playBtn">&#9658;</button>
    <button class="play-pause-btn" id="playPauseBtn">&#10074;&#10074;</button>
    <div class="dots-container" id="dotsContainer">
        <span class="dot active" data-index="0"></span>
        <span class="dot" data-index="1"></span>
        <span class="dot" data-index="2"></span>
        <span class="dot" data-index="3"></span>
        <span class="dot" data-index="4"></span>
    </div>

</html>
