<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Home work 8</title>
  </head>

  <body>
    <h1>Homework 8</h1>

    <div class="container">
      <p>1. 1 block to the left, 1 to the right:</p>
      <div class="container_div left"></div>
      <div class="container_div right"></div>
    </div>

    <div class="container">
      <p>2. 1 block to the left, few blocks to the right:</p>
      <div class="container_div left"></div>
      <div class="container_div right"></div>
      <div class="container_div right"></div>
      <div class="container_div right"></div>
    </div>

    <div class="container">
      <p>3. 2 blocks to the left, 2 blocks to the right:</p>
      <div class="container_div left"></div>
      <div class="container_div left"></div>
      <div class="container_div right"></div>
      <div class="container_div right"></div>
    </div>

    <div class="container">
      <p>4. 3 blocks to the right, 2 of them one below the other:</p>
      <div class="right">
        <div class="container_div"></div>
        <div class="container_div"></div>
      </div>
      <div class="container_div right big"></div>
    </div>

    <div class="container">
      <p>5. 3 blocks in the center (2 of them one below the other):</p>
      <div class="center fit-content">
        <div class="right">
          <div class="container_div margin-top"></div>
          <div class="container_div"></div>
        </div>
        <div class="container_div big"></div>
      </div>
    </div>
  </body>
</html>
