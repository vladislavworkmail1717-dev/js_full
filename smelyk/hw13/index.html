<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style/style.css" />
    <title>Home work 13</title>
  </head>

  <body>
    <h1>SVG figures:</h1>
    <div class="figures">
      <div>
        <svg width="200" height="200">
          <rect class="square" width="100" height="100" x="10" y="40" />
        </svg>
      </div>

      <div>
        <svg width="200" height="200">
          <rect class="rectangular" width="100" height="150" x="10" y="10" />
        </svg>
      </div>

      <div>
        <svg width="200" height="200">
          <circle class="circle" cx="60" cy="100" r="50" />
        </svg>
      </div>

      <div>
        <svg width="200" height="200">
          <ellipse class="ellips" cx="90" cy="100" rx="80" ry="30" />
        </svg>
      </div>
    </div>
  </body>
