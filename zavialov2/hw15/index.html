<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              montserrat: ["Montserrat", "sans-serif"],
              oswald: ["Oswald", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Психолог</title>
  </head>
  <body class="font-montserrat">
    <section
      class="relative h-[768px] bg-cover bg-center"
      style="background-image: url(./images/main-photo.jpg)"
    >
      <div class="absolute inset-0 bg-black/30"></div>
      <div class="relative z-10 w-full pl-[130px] pr-[130px]">
        <header class="flex justify-between items-center">
          <img src="./images/logo.png" class="w-[160px] pt-[29.47px]" />
          <nav class="hidden md:flex gap-8 text-[#85AAAB] pt-[54px] text-lg">
            <a href="#" class="text-[#6DE1E3] border-b-2 border-[#6DE1E3] pb-1"
              >Головна</a
            >
            <a href="#" class="hover:text-[#6DE1E3]">Події</a>
            <a href="#" class="hover:text-[#6DE1E3]">Контакти</a>
            <a href="#" class="hover:text-[#6DE1E3]">Блог</a>
          </nav>
        </header>
        <div class="max-w-[400px] text-white">
          <h1
            class="font-oswald text-4xl w-[1000px] md:text-5xl leading-tight pt-[150px] pb-[48px]"
          >
            Ваш особистий психолог<br />
            у Кривому Розі
          </h1>
          <p class="text-lg pb-[48px] text-gray-200">
            Особисті, сімейні та<br />групові консультації
          </p>
          <button
            class="bg-[#2D5E5E] w-[250px] h-[48px] rounded-lg hover:bg-[#244d4d] transition"
          >
            Більше
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
