<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Figures</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="container">
        <h1>SVG Figures</h1>
      </div>
    </header>

    <section class="svg-demo">
      <div class="container">
        <h2>SVG Figures</h2>

        <svg width="500" height="300">
          <rect x="20" y="20" width="80" height="80" class="square" />

          <rect x="120" y="20" width="140" height="80" class="rectangle" />

          <circle cx="80" cy="180" r="40" class="circle" />

          <ellipse cx="260" cy="180" rx="70" ry="40" class="ellipse" />
        </svg>
      </div>
    </section>
  </body>
</html>
